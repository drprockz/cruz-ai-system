[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short -m "not live"
markers =
    voice: integration tests that require DEEPGRAM_API_KEY / ANTHROPIC_API_KEY (opt-in, hit real APIs)
    live: live integration tests against real external services (skipped in CI)
