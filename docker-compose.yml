# CRUZ AI System — Docker services.
#
# Runs supplementary infrastructure that CRUZ depends on. PostgreSQL and
# Redis are expected to be installed via Homebrew on the Mac Mini host
# (per CLAUDE.md line 314: self-hosted via Homebrew, zero cost).
#
# Usage:
#   docker compose up -d qdrant
#   docker compose logs -f qdrant
#   docker compose down
#
# To bring up everything (including optional Redis/PG for CI):
#   docker compose --profile full up -d

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: cruz-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP REST + gRPC
      - "6334:6334"   # gRPC metrics
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD", "sh", "-c", "timeout 3 bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Optional: run Postgres and Redis in containers too. The primary setup on
  # the Mac Mini uses Homebrew services — use this profile only for CI or when
  # you don't want host-installed services.
  postgres:
    image: postgres:16
    container_name: cruz-postgres
    restart: unless-stopped
    profiles: ["full"]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: cruz
      POSTGRES_PASSWORD: cruz_dev_password
      POSTGRES_DB: cruz_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cruz -d cruz_db"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cruz-redis
    restart: unless-stopped
    profiles: ["full"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Monitoring stack ──────────────────────────────────────────────────
  # Bring up with:  docker compose --profile monitoring up -d
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: cruz-uptime-kuma
    restart: unless-stopped
    profiles: ["monitoring"]
    ports:
      - "3001:3001"
    volumes:
      - uptime_kuma_data:/app/data

  loki:
    image: grafana/loki:2.9.0
    container_name: cruz-loki
    restart: unless-stopped
    profiles: ["monitoring"]
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki

  grafana:
    image: grafana/grafana:10.4.0
    container_name: cruz-grafana
    restart: unless-stopped
    profiles: ["monitoring"]
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki

volumes:
  qdrant_storage:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uptime_kuma_data:
    driver: local
  loki_data:
    driver: local
  grafana_data:
    driver: local
